name: Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Compute Version
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.published }}
      new_release_version: ${{ steps.semantic.outputs.version }}
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3.2.0
        id: app_token
        with:
          client-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24.15.0'

      - name: Install semantic-release dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/semantic-release"
          cat > "$RUNNER_TEMP/semantic-release/package.json" <<'EOF'
          {
            "private": true,
            "devDependencies": {
              "semantic-release": "25.0.5",
              "@semantic-release/commit-analyzer": "13.0.1",
              "@semantic-release/release-notes-generator": "14.1.1",
              "@semantic-release/exec": "7.1.0",
              "@semantic-release/github": "12.0.9",
              "conventional-changelog-conventionalcommits": "10.2.0"
            }
          }
          EOF
          npm install --prefix "$RUNNER_TEMP/semantic-release"
          echo "$RUNNER_TEMP/semantic-release/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Compute next version (dry-run)
        id: semantic
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          semantic-release --dry-run

  build:
    name: Build ${{ matrix.arch }}
    needs: version
    if: needs.version.outputs.new_release_published == 'true'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: DeterminateSystems/nix-installer-action@v22

      - name: Build static binaries
        run: |
          WHISPER=$(nix build --impure --no-link --print-out-paths -f static.nix whisper-cli)
          FFMPEG=$(nix build --impure --no-link --print-out-paths -f static.nix ffmpeg | grep -e '-bin$')
          install -m755 "$WHISPER/bin/whisper-cli" "whisper-cli-linux-${{ matrix.arch }}"
          install -m755 "$FFMPEG/bin/ffmpeg" "ffmpeg-linux-${{ matrix.arch }}"

      - name: Sanity-check binaries
        run: |
          for bin in whisper-cli ffmpeg; do
            file "$bin-linux-${{ matrix.arch }}" | grep -q 'statically linked'
          done
          "./ffmpeg-linux-${{ matrix.arch }}" -version
          "./whisper-cli-linux-${{ matrix.arch }}" --help > /dev/null

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: binaries-${{ matrix.arch }}
          path: |
            whisper-cli-linux-${{ matrix.arch }}
            ffmpeg-linux-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create Release
    needs:
      - version
      - build
    if: needs.version.outputs.new_release_published == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v3.2.0
        id: app_token
        with:
          client-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}

      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: '24.15.0'

      - name: Install semantic-release dependencies
        run: |
          mkdir -p "$RUNNER_TEMP/semantic-release"
          cat > "$RUNNER_TEMP/semantic-release/package.json" <<'EOF'
          {
            "private": true,
            "devDependencies": {
              "semantic-release": "25.0.5",
              "@semantic-release/commit-analyzer": "13.0.1",
              "@semantic-release/release-notes-generator": "14.1.1",
              "@semantic-release/exec": "7.1.0",
              "@semantic-release/github": "12.0.9",
              "conventional-changelog-conventionalcommits": "10.2.0"
            }
          }
          EOF
          npm install --prefix "$RUNNER_TEMP/semantic-release"
          echo "$RUNNER_TEMP/semantic-release/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release artifacts
        run: |
          cd dist
          chmod +x whisper-cli-linux-* ffmpeg-linux-*
          sha256sum whisper-cli-linux-* ffmpeg-linux-* > checksums.txt

      - name: Verify all assets present
        run: |
          cd dist
          missing=0
          for f in \
            whisper-cli-linux-amd64 \
            whisper-cli-linux-arm64 \
            ffmpeg-linux-amd64 \
            ffmpeg-linux-arm64 \
            checksums.txt; do
            if [ ! -f "$f" ]; then
              echo "::error::missing release asset: $f"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "refusing to publish an incomplete immutable release"
            exit 1
          fi
          ls -la

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          semantic-release
